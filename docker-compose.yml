services:
  payshare-manager:
    build:
      context: .
    image: payshare-manager:local
    container_name: payshare-manager
    restart: unless-stopped
    ports:
      - "${PAYSHARE_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PAYSHARE_DB_PATH: /app/data/payshare.db
    volumes:
      - ./data:/app/data
